version: '3.8'

services:
#BD Postgres
  postgres:
    image: postgres:15-alpine
    container_name: gd_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - gd-network

#front
  web:
    build: ./web    
    container_name: gd_web
    ports:
      - "5173:5173"
    volumes:
      - ./web:/usr/src/app
      - /usr/src/app/node_modules 
    depends_on:
      - postgres
    networks:
      - gd-network
  
  api:
    build: ./api
    container_name: gd_api
    ports:
    - "3000:3000"
    volumes:
      - ./api:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      - postgres
    networks:
      - gd-network

volumes:
  pgdata:

networks:
  gd-network:
    driver: bridge